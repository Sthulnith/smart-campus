spring.application.name=backend
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/smart_campus_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:NewPassword123!}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

app.auth.reset-demo-link-enabled=${AUTH_RESET_DEMO_LINK:false}
app.auth.reset-cooldown-seconds=${AUTH_RESET_COOLDOWN_SECONDS:60}
app.seed-demo-users=${APP_SEED_DEMO_USERS:false}
app.mail.from=${MAIL_FROM:}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

file.upload-dir=${UPLOAD_DIR:./uploads}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

app.frontend-url=${APP_FRONTEND_URL:${FRONTEND_URL:http://localhost:3000}}
app.backend-url=${BACKEND_URL:http://localhost:8080}
app.oauth2.redirect-url=${OAUTH2_REDIRECT_URL:http://localhost:3000/auth/callback}
app.frontend-login-url=${FRONTEND_LOGIN_URL:http://localhost:3000/login}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy-client-secret}
spring.security.oauth2.client.registration.google.scope=${GOOGLE_SCOPES:email,profile}
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}

app.security.csrf.ignore=${CSRF_IGNORE_PATHS:/api/auth/signin,/api/auth/signup,/api/auth/register,/api/auth/forgot-password,/api/auth/reset-password,/api/auth/logout,/oauth2/**,/login/**}
app.security.throttle.signin.max-attempts=${SIGNIN_MAX_ATTEMPTS:8}
app.security.throttle.signin.window-seconds=${SIGNIN_WINDOW_SECONDS:60}
app.security.throttle.forgot-password.max-attempts=${FORGOT_PASSWORD_MAX_ATTEMPTS:5}
app.security.throttle.forgot-password.window-seconds=${FORGOT_PASSWORD_WINDOW_SECONDS:300}