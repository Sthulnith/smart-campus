spring.application.name=backend
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/smart_campus_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}

file.upload-dir=${UPLOAD_DIR:./uploads}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

app.frontend-url=${FRONTEND_URL:http://localhost:3000}
app.backend-url=${BACKEND_URL:http://localhost:8080}
app.oauth2.redirect-url=${OAUTH2_REDIRECT_URL:http://localhost:3000/auth/callback}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax