spring.application.name=backend

# Local PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/smart_campus
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

app.auth.reset-demo-link-enabled=false
app.auth.reset-cooldown-seconds=60
app.seed-demo-users=false

app.mail.from=
spring.mail.host=
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

file.upload-dir=./uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

app.frontend-url=http://localhost:3000
app.backend-url=http://localhost:8080
app.oauth2.redirect-url=http://localhost:3000/auth/callback
app.frontend-login-url=http://localhost:3000/login

# Temporary dummy Google OAuth values for local startup
spring.security.oauth2.client.registration.google.client-id=dummy-client-id
spring.security.oauth2.client.registration.google.client-secret=dummy-client-secret
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=false

app.security.csrf.ignore=/api/auth/signin,/api/auth/signup,/api/auth/register,/api/auth/forgot-password,/api/auth/reset-password,/api/auth/logout,/oauth2/**,/login/**
app.security.throttle.signin.max-attempts=8
app.security.throttle.signin.window-seconds=60
app.security.throttle.forgot-password.max-attempts=5
app.security.throttle.forgot-password.window-seconds=300